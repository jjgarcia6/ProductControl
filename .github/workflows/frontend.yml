name: frontend

# Path-triggered: solo corre si cambió frontend/.
on:
  push:
    branches: [main]
    paths: ['frontend/**', '.github/workflows/frontend.yml']
  pull_request:
    paths: ['frontend/**', '.github/workflows/frontend.yml']

defaults:
  run:
    working-directory: frontend

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      # Etapas bloqueantes, en orden (§7.2).
      - name: Lint — eslint
        run: npm run lint

      - name: Type-check — tsc
        run: npm run typecheck

      - name: Escaneo de dependencias — npm audit
        run: npm audit --audit-level=moderate

      - name: Tests — vitest
        run: npm test

      - name: Instalar WebKit (Safari iOS)
        run: npx playwright install --with-deps webkit

      - name: E2E cross-browser — playwright (WebKit)
        run: npx playwright test

  # Deploy en Vercel es automático (integración Git de Vercel), no se orquesta aquí.
